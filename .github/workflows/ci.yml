name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt in to Node 24 for JS actions until third-party actions (e.g. expo-github-action) ship node24 runtimes.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run type-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  a11y:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:a11y
        continue-on-error: true

  e2e:
    runs-on: macos-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - run: npm run test:e2e
        continue-on-error: true

  visual:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Visual regression (non-blocking)
        run: echo "Visual regression tests placeholder — configure with Chromatic or Percy"
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Web export
        run: npx expo export --platform web
        env:
          NODE_ENV: production

  deploy-web-preview:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    environment: preview
    outputs:
      deployment_url: ${{ steps.deploy_preview.outputs.url }}
      e2e_remote_suite_default: ${{ steps.supabase_e2e.outputs.e2e_remote_suite }}
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: deploy-web-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      - name: Require linked EAS project
        run: |
          if [ ! -f eas.json ]; then
            echo "Missing eas.json — run locally: npx eas-cli@latest init"
            echo "Then commit eas.json and any app.json extra.eas changes."
            exit 1
          fi
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Resolve Supabase preview env for this PR
        run: npm run ci:resolve-supabase-pr-preview
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
          SUPABASE_PREVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          STAGING_EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_EXPO_PUBLIC_SUPABASE_URL }}
          STAGING_EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          FALLBACK_EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          FALLBACK_EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Record default remote E2E suite from Supabase resolution
        id: supabase_e2e
        run: |
          set -euo pipefail
          test -f .bike-bin-ci-supabase.json
          SUITE="$(node -p "JSON.parse(require('node:fs').readFileSync('.bike-bin-ci-supabase.json','utf8')).e2eRemoteSuite")"
          PREVIEW_REF="$(node -p "String(JSON.parse(require('node:fs').readFileSync('.bike-bin-ci-supabase.json','utf8')).previewProjectRef || '')")"
          if [ "$SUITE" != "smoke" ] && [ "$SUITE" != "full" ]; then
            echo "::error::Invalid e2eRemoteSuite in .bike-bin-ci-supabase.json: $SUITE"
            exit 1
          fi
          echo "e2e_remote_suite=$SUITE" >> "$GITHUB_OUTPUT"
          echo "preview_project_ref=$PREVIEW_REF" >> "$GITHUB_OUTPUT"
          echo "Default remote E2E suite (from resolver): $SUITE"
          echo "Preview project ref for seed (if any): ${PREVIEW_REF:-<none>}"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Seed preview Supabase branch (SQL)
        if: ${{ steps.supabase_e2e.outputs.preview_project_ref != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ steps.supabase_e2e.outputs.preview_project_ref }}
        run: bash scripts/seed-remote-sql.sh
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Export web
        run: npm run build:web
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_ENV: preview
          NODE_ENV: production
      # EAS deploy reads .env* when building the upload manifest; mirror the same
      # EXPO_PUBLIC_* the export step used (Supabase from GITHUB_ENV via resolver).
      - name: Write .env.production.local for EAS deploy
        run: |
          node <<'NODE'
          const fs = require('fs');
          const esc = (v) => JSON.stringify(v == null ? '' : String(v));
          const lines = [
            `EXPO_PUBLIC_SUPABASE_URL=${esc(process.env.EXPO_PUBLIC_SUPABASE_URL)}`,
            `EXPO_PUBLIC_SUPABASE_ANON_KEY=${esc(process.env.EXPO_PUBLIC_SUPABASE_ANON_KEY)}`,
            `EXPO_PUBLIC_ENV=${esc(process.env.EXPO_PUBLIC_ENV)}`,
            `EXPO_PUBLIC_SENTRY_DSN=${esc(process.env.EXPO_PUBLIC_SENTRY_DSN)}`,
          ];
          fs.writeFileSync('.env.production.local', lines.join('\n') + '\n', 'utf8');
          NODE
        env:
          EXPO_PUBLIC_ENV: preview
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      - name: Deploy to EAS Hosting (preview)
        id: deploy_preview
        run: |
          set -euo pipefail
          eas deploy --non-interactive --json > deploy-result.json
          URL="$(node -p "String(JSON.parse(require('node:fs').readFileSync('deploy-result.json','utf8')).url || '')")"
          if [ -z "$URL" ]; then
            echo "::error::eas deploy JSON missing url"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment PR with web preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('deploy-result.json', 'utf8');
            const data = JSON.parse(raw);
            const url = data.url;
            if (!url || typeof url !== 'string') {
              core.setFailed('eas deploy JSON missing url');
              return;
            }
            const marker = '<!-- bike-bin-web-preview -->';
            const lines = [marker, '', '### Web preview', '', `**URL:** ${url}`];
            if (data.dashboardUrl) {
              lines.push('', `[Hosting dashboard](${data.dashboardUrl})`);
            }
            const body = lines.join('\n');
            const issue_number = context.payload.pull_request?.number;
            if (!issue_number) {
              core.setFailed('Expected pull_request event with number');
              return;
            }
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const existing = comments.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

  # Remote Playwright: suite defaults from Supabase resolver (preview branch → full; staging/fallback → smoke).
  # Override with GitHub Environment **preview** variable E2E_REMOTE_SUITE=smoke|full when needed.
  e2e-remote-preview:
    runs-on: ubuntu-latest
    needs: [deploy-web-preview]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    environment: preview
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Remote E2E against preview deployment
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-web-preview.outputs.deployment_url }}
          REMOTE_SUITE_OVERRIDE: ${{ vars.E2E_REMOTE_SUITE }}
          DEFAULT_SUITE: ${{ needs.deploy-web-preview.outputs.e2e_remote_suite_default }}
        run: |
          set -euo pipefail
          if [ -z "${PLAYWRIGHT_BASE_URL}" ]; then
            echo "::error::Missing deployment_url from deploy-web-preview"
            exit 1
          fi
          if [ -n "${REMOTE_SUITE_OVERRIDE}" ]; then
            SUITE="$REMOTE_SUITE_OVERRIDE"
          else
            SUITE="${DEFAULT_SUITE:-smoke}"
          fi
          if [ "$SUITE" != "smoke" ] && [ "$SUITE" != "full" ]; then
            echo "::error::E2E_REMOTE_SUITE must be smoke or full, got: $SUITE"
            exit 1
          fi
          echo "Running remote E2E suite: $SUITE"
          if [ "$SUITE" = "smoke" ]; then
            npm run test:e2e:remote-smoke
          else
            npm run test:e2e:remote-full
          fi

  marketing:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sites/marketing/package-lock.json
      - run: npm ci
        working-directory: sites/marketing
      - run: npm run test && npm run build
        working-directory: sites/marketing

  sonarcloud:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
