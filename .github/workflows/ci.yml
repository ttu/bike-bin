name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt in to Node 24 for JS actions until third-party actions (e.g. expo-github-action) ship node24 runtimes.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run type-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  a11y:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:a11y
        continue-on-error: true

  e2e:
    runs-on: macos-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - run: npm run test:e2e
        continue-on-error: true

  visual:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Visual regression (non-blocking)
        run: echo "Visual regression tests placeholder — configure with Chromatic or Percy"
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Web export
        run: npx expo export --platform web
        env:
          NODE_ENV: production

  deploy-web-preview:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: deploy-web-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      - name: Require linked EAS project
        run: |
          if [ ! -f eas.json ]; then
            echo "Missing eas.json — run locally: npx eas-cli@latest init"
            echo "Then commit eas.json and any app.json extra.eas changes."
            exit 1
          fi
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Resolve Supabase preview env for this PR
        run: npm run ci:resolve-supabase-pr-preview
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
          SUPABASE_PREVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          STAGING_EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_EXPO_PUBLIC_SUPABASE_URL }}
          STAGING_EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          FALLBACK_EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          FALLBACK_EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Export web
        run: npm run build:web
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_ENV: preview
          NODE_ENV: production
      # EAS deploy reads .env* when building the upload manifest; mirror the same
      # EXPO_PUBLIC_* the export step used (Supabase from GITHUB_ENV via resolver).
      - name: Write .env.production.local for EAS deploy
        run: |
          node <<'NODE'
          const fs = require('fs');
          const esc = (v) => JSON.stringify(v == null ? '' : String(v));
          const lines = [
            `EXPO_PUBLIC_SUPABASE_URL=${esc(process.env.EXPO_PUBLIC_SUPABASE_URL)}`,
            `EXPO_PUBLIC_SUPABASE_ANON_KEY=${esc(process.env.EXPO_PUBLIC_SUPABASE_ANON_KEY)}`,
            `EXPO_PUBLIC_ENV=${esc(process.env.EXPO_PUBLIC_ENV)}`,
            `EXPO_PUBLIC_SENTRY_DSN=${esc(process.env.EXPO_PUBLIC_SENTRY_DSN)}`,
          ];
          fs.writeFileSync('.env.production.local', lines.join('\n') + '\n', 'utf8');
          NODE
        env:
          EXPO_PUBLIC_ENV: preview
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      - name: Deploy to EAS Hosting (preview)
        run: eas deploy --non-interactive --json | tee deploy-result.json

      - name: Comment PR with web preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('deploy-result.json', 'utf8');
            const data = JSON.parse(raw);
            const url = data.url;
            if (!url || typeof url !== 'string') {
              core.setFailed('eas deploy JSON missing url');
              return;
            }
            const marker = '<!-- bike-bin-web-preview -->';
            const lines = [marker, '', '### Web preview', '', `**URL:** ${url}`];
            if (data.dashboardUrl) {
              lines.push('', `[Hosting dashboard](${data.dashboardUrl})`);
            }
            const body = lines.join('\n');
            const issue_number = context.payload.pull_request?.number;
            if (!issue_number) {
              core.setFailed('Expected pull_request event with number');
              return;
            }
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const existing = comments.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

  marketing:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sites/marketing/package-lock.json
      - run: npm ci
        working-directory: sites/marketing
      - run: npm run test && npm run build
        working-directory: sites/marketing

  sonarcloud:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
