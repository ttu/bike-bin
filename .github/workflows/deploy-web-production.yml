# EAS Hosting production deploy: push a version tag (e.g. v1.2.3).
#
# GitHub Environment "production": EXPO_PUBLIC_SUPABASE_URL, EXPO_PUBLIC_SUPABASE_ANON_KEY, EXPO_PUBLIC_SENTRY_DSN (optional).
# Repository secret: EXPO_TOKEN.

name: Deploy web production

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-web-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Require linked EAS project
        run: |
          if [ ! -f eas.json ]; then
            echo "Missing eas.json — run locally: npx eas-cli@latest init"
            echo "Then commit eas.json and any app.json extra.eas changes."
            exit 1
          fi
      - name: Require Expo web env (production environment)
        env:
          URL_SET: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL != '' }}
          KEY_SET: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY != '' }}
        run: |
          if [ "$URL_SET" != "true" ] || [ "$KEY_SET" != "true" ]; then
            echo "Missing GitHub Environment \"production\" secrets EXPO_PUBLIC_SUPABASE_URL and/or EXPO_PUBLIC_SUPABASE_ANON_KEY."
            echo "Settings → Environments → production → Environment secrets"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Export web
        run: npm run build:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_ENV: production
          NODE_ENV: production
      - name: Deploy to EAS Hosting (production)
        run: eas deploy --prod --non-interactive
