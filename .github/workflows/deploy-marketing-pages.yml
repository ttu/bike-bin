# Static marketing site (Astro) → GitHub Pages. Enable: Settings → Pages → Source: GitHub Actions.
# Required repo variables: MARKETING_SITE_URL, MARKETING_BASE_PATH (see docs/development.md).

name: Deploy marketing site (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'sites/marketing/**'
      - '.github/workflows/deploy-marketing-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages-marketing
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      pages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sites/marketing/package-lock.json
      - name: Configure Astro for GitHub Pages
        env:
          MARKETING_SITE_URL_VAR: ${{ vars.MARKETING_SITE_URL }}
          MARKETING_BASE_PATH_VAR: ${{ vars.MARKETING_BASE_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${MARKETING_SITE_URL_VAR:-}" ] || [ -z "${MARKETING_BASE_PATH_VAR:-}" ]; then
            echo "::error::Set Actions repository variables MARKETING_SITE_URL and MARKETING_BASE_PATH (see docs/development.md)."
            exit 1
          fi
          echo "ASTRO_SITE_URL=$MARKETING_SITE_URL_VAR" >> "$GITHUB_ENV"
          echo "ASTRO_BASE_PATH=$MARKETING_BASE_PATH_VAR" >> "$GITHUB_ENV"
          echo "Configured Astro site=$MARKETING_SITE_URL_VAR base=$MARKETING_BASE_PATH_VAR"
      - run: npm ci
        working-directory: sites/marketing
      - run: npm run test && npm run build
        working-directory: sites/marketing
      - uses: actions/upload-pages-artifact@v4
        with:
          path: sites/marketing/dist

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
